name: Singgah POS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-check:
    name: Backend Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Build Backend
      run: |
        cd backend
        go build -v ./cmd/server

  web-dashboard-check:
    name: Web Dashboard Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-dashboard/package-lock.json

    - name: Install Dependencies
      run: |
        cd web-dashboard
        npm ci

    - name: Build Dashboard
      run: |
        cd web-dashboard
        npm run build

  mobile-app-check:
    name: Mobile POS Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: singgah-pos-mobile/package-lock.json

    - name: Install Dependencies
      run: |
        cd singgah-pos-mobile
        npm ci

    - name: Run Type Check (TypeScript)
      run: |
        cd singgah-pos-mobile
        npx tsc --noEmit
